name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          LLM_PROVIDER: mock
          DATABASE_URL: sqlite:///./data/test.db
          CHROMA_DIR: ./data/test_chroma
        run: pytest -q
