# Render blueprint — https://render.com
# 1. Connect GitHub repo
# 2. Render detects this file and creates a web service
# 3. Set GOOGLE_API_KEY in dashboard (Environment tab) — see deploy/free-llm-cloud.md

services:
  - type: web
    name: ai-agent-tutorial
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: APP_ENV
        value: production
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: CHROMA_DIR
        value: ./data/chroma
